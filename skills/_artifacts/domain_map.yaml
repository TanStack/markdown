          const html = renderHtml(userMarkdown)
          // Apply an independent final sanitizer when required.
        source: 'docs/core-concepts/security.md'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Security boundary in 0.0.10.'
        skills: ['production-pipelines', 'react-rendering', 'octane-rendering']
      - mistake: 'Returning a complete pre/code tree from a highlighter'
        mechanism: 'The callback output becomes the trusted contents of the renderer-owned code element.'
        wrong_pattern: |
          renderHtml(source, { highlighter: highlightToHtml })
        correct_pattern: |
          renderHtml(source, {
            highlighter: code => renderCodeContents(code),
          })
        source: 'docs/guides/syntax-highlighting.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'CodeHighlighter contract in 0.0.10.'
      - mistake: 'Trusting arbitrary highlighter output'
        mechanism: 'Highlighter output is inserted without escaping in HTML, React, and Octane renderers.'
        wrong_pattern: |
          highlighter: code => thirdPartyTransform(code)
        correct_pattern: |
          highlighter: code => trustedEscapingHighlighter(code)
        source: 'docs/core-concepts/security.md'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Trusted callback boundary in 0.0.10.'
      - mistake: 'Bundling optional highlighting into the client path'
        mechanism: 'Language grammars and themes can outweigh Markdown parsing; highlighting should stay build-time or server-side when possible.'
        wrong_pattern: |
          import { allLanguages } from 'large-highlighter'
          export const Article = () => <Markdown highlighter={clientHighlighter} />
        correct_pattern: |
          const document = parseMarkdown(source)
          const html = renderHtml(document, { highlighter: serverHighlighter })
        source: 'docs/guides/performance.md'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Intentional dependency boundary in 0.0.10.'
      - mistake: 'Treating safe defaults as a complete sanitizer'
        mechanism: 'Dangerous protocols and raw HTML are constrained, but application-specific outbound links, images, and final HTML policies remain external.'
        wrong_pattern: |
          const safeForEveryThreatModel = renderHtml(userMarkdown)
        correct_pattern: |
          const rendered = renderHtml(userMarkdown)
          const safeForApp = sanitizeWithApplicationPolicy(rendered)
        source: 'docs/core-concepts/security.md'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Documented security limit in 0.0.10.'


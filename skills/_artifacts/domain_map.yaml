    skills: ['docs-features', 'custom-extensions', 'production-pipelines']
    description: 'Raw HTML, extension HTML, and highlighter markup enable richer docs while bypassing core escaping.'
    implication: 'An agent may enable a trusted boundary globally to solve a presentation problem.'
  - name: 'Parse-ahead performance versus option timing'
    skills: ['render-markdown', 'custom-extensions', 'production-pipelines']
    description: 'Caching an AST saves parsing, but parser options and document transforms must be applied before the cache is created.'
    implication: 'An agent may attempt to change parse behavior at renderer time or cache an AST built with incomplete options.'

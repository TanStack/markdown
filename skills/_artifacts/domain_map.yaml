    failure_modes:
      - mistake: 'Claiming a multi-line block without consuming it'
        mechanism: 'Returning a node advances at least one line; extensions must explicitly consume the complete owned block.'
        wrong_pattern: |
          parseBlock(context) {
            return makeNode(context.lines[context.index])
          }
        correct_pattern: |
          parseBlock(context) {
            context.consume(consumedLines)
            return makeNode(content)
          }
        source: 'docs/guides/extensions.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Block extension contract in 0.0.10.'
      - mistake: 'Ordering a general parser before a specific parser'
        mechanism: 'Extensions run in array order, so an earlier broad parser can prevent a later parser from seeing its syntax.'
        wrong_pattern: |
          const extensions = [generalBlocks, specificCallouts]
        correct_pattern: |
          const extensions = [specificCallouts, generalBlocks]
        source: 'docs/guides/extensions.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current ordered extension lifecycle in 0.0.10.'

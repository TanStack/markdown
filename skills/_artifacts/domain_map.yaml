    skills: ['react-rendering', 'octane-rendering', 'custom-extensions']
    description: 'Core output is equivalent across renderers, while component maps and HTML-only hooks intentionally leave that parity boundary.'
    implication: 'An agent may assume custom HTML hooks or replacement components behave identically in every renderer.'

